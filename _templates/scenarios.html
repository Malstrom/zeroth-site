<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="meta.title"></title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<!--
  TEMPLATE: scenarios.html
  USE FOR: {framework}/scenarios.html for all frameworks

  AFTER COPYING:
    1. Update data-page on <body> (data-page="scenarios")
    2. Update loader path: ./assets/js/i18n.js -> ../assets/js/i18n.js
    3. Update all href paths
    4. If aurora/sudo-hire-me: remove the Why nav link

  CONTENT SOURCES:
    intro          -> frameworks/{fw}/.scenarios.yml (general description)
    scenario cards -> frameworks/{fw}/scenarios/{scenario}.yml
                      fields: on: (trigger phrases), steps:, output:
    RULE: translate all content to human language — no internal technical terms
    RULE: trigger phrases must be in natural language of the user
-->
<body data-page="scenarios">

  <nav class="nav" aria-label="Main navigation">
    <div class="nav__inner">
      <a href="./zeroth.html" class="nav__logo" aria-label="zeroth home">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="10" cy="10" r="2.5" fill="currentColor"/>
          <line x1="10" y1="2" x2="10" y2="5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="10" y1="14.5" x2="10" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2" y1="10" x2="5.5" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="14.5" y1="10" x2="18" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        zeroth
      </a>
      <div class="nav__actions">
        <span class="nav__framework-name" data-i18n="nav.framework_name"></span>
        <!-- Remove for aurora / sudo-hire-me -->
        <a href="./why.html" class="nav__link" data-i18n="nav.why">Why</a>
        <a href="./scenarios.html" class="nav__link nav__link--active" aria-current="page" data-i18n="nav.scenarios">Scenarios</a>
        <a href="./start.html" class="nav__link" data-i18n="nav.start">Start</a>
        <button class="nav__lang" data-lang-toggle aria-label="Switch language">EN / RU</button>
        <button class="nav__toggle" data-theme-toggle aria-label="Switch to dark mode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <main>

    <!-- [1] INTRO
         What is a scenario: a trigger phrase that activates a precise flow
         SOURCE: frameworks/{fw}/.scenarios.yml -->
    <section class="hero" id="intro" aria-labelledby="intro-heading">
      <div class="container">
        <p class="hero__eyebrow" data-i18n="nav.framework_name"></p>
        <h1 class="hero__headline" id="intro-heading" data-i18n="intro.heading"></h1>
        <p class="hero__tagline" data-i18n="intro.body"></p>
      </div>
    </section>

    <!-- [2] SCENARIO CARDS
         One card per scenario defined in the framework.
         Cards are generated dynamically by i18n.js reading scenarios.* keys from YAML.
         Each card shows:
           - scenario name (human-readable, not internal id)
           - trigger phrases in natural language
           - what happens step by step
           - what remains after the session (concrete outputs)
         SOURCE: frameworks/{fw}/scenarios/{scenario}.yml -> on:, steps:, output:
         RULE: no internal technical terms
         RULE: steps written from user perspective -->
    <section class="section" id="scenarios" aria-label="Scenarios">
      <div class="container">
        <div class="scenarios-grid" id="scenarios-grid" role="list">
          <!-- JS populates scenario cards here from YAML keys scenarios.* -->
          <!-- Fallback static card structure for reference:
          <article class="scenario-card" role="listitem">
            <span class="card__name" data-i18n="scenarios.{id}.name"></span>
            <div class="card__triggers">
              <p class="card__triggers-label" data-i18n="scenarios.triggers_label">You write:</p>
              <ul class="card__trigger-list">
                <li data-i18n="scenarios.{id}.trigger_1"></li>
                <li data-i18n="scenarios.{id}.trigger_2"></li>
              </ul>
            </div>
            <hr class="card__rule">
            <ol class="card__steps">
              <li data-i18n="scenarios.{id}.step_1"></li>
              <li data-i18n="scenarios.{id}.step_2"></li>
              <li data-i18n="scenarios.{id}.step_3"></li>
            </ol>
            <div class="card__output">
              <p class="card__output-label" data-i18n="scenarios.output_label">What remains:</p>
              <p data-i18n="scenarios.{id}.output"></p>
            </div>
          </article>
          -->
        </div>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__inner">
        <span class="footer__left" data-i18n="footer.copy"></span>
        <nav class="footer__links" aria-label="Footer links">
          <a href="./zeroth.html" data-i18n="footer.link_zeroth">zeroth</a>
          <a href="https://github.com/Malstrom/zeroth" target="_blank" rel="noopener noreferrer" data-i18n="footer.link_github">GitHub</a>
          <a href="./scenarios.html" data-i18n="footer.link_scenarios">Scenarios</a>
          <a href="./start.html" data-i18n="footer.link_start">Start</a>
        </nav>
        <div class="footer__toggles">
          <button class="nav__lang" data-lang-toggle aria-label="Switch language">EN / RU</button>
          <button class="nav__toggle" data-theme-toggle aria-label="Switch to dark mode">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js.yaml.min.js"></script>
  <script src="./assets/js/i18n.js"></script>
  <script>
    (function(){
      const r = document.documentElement;
      const toggles = document.querySelectorAll('[data-theme-toggle]');
      const sun = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
      const moon = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      let theme = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
      r.setAttribute('data-theme', theme);
      toggles.forEach(btn => {
        btn.innerHTML = theme === 'dark' ? sun : moon;
        btn.addEventListener('click', () => {
          theme = theme === 'dark' ? 'light' : 'dark';
          r.setAttribute('data-theme', theme);
          toggles.forEach(b => { b.innerHTML = theme === 'dark' ? sun : moon; });
        });
      });
    })();
  </script>

</body>
</html>
