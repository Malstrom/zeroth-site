<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="meta.title"></title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<!--
  TEMPLATE: start.html
  USE FOR: {framework}/start.html for all frameworks

  AFTER COPYING:
    1. Update data-page on <body> (data-page="start")
    2. Update loader path: ./assets/js/i18n.js -> ../assets/js/i18n.js
    3. Update all href paths
    4. If aurora/sudo-hire-me: remove Why nav link

  CONTENT SOURCES:
    intro + steps  -> frameworks/{fw}/onboarding.yml
    RULE: steps numbered 01-05, no icons
    RULE: estimated time based on onboarding.yml
-->
<body data-page="start">

  <nav class="nav" aria-label="Main navigation">
    <div class="nav__inner">
      <a href="./zeroth.html" class="nav__logo" aria-label="zeroth home">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="10" cy="10" r="2.5" fill="currentColor"/>
          <line x1="10" y1="2" x2="10" y2="5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="10" y1="14.5" x2="10" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2" y1="10" x2="5.5" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="14.5" y1="10" x2="18" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        zeroth
      </a>
      <div class="nav__actions">
        <span class="nav__framework-name" data-i18n="nav.framework_name"></span>
        <!-- Remove for aurora / sudo-hire-me -->
        <a href="./why.html" class="nav__link" data-i18n="nav.why">Why</a>
        <a href="./scenarios.html" class="nav__link" data-i18n="nav.scenarios">Scenarios</a>
        <a href="./start.html" class="nav__link nav__link--active" aria-current="page" data-i18n="nav.start">Start</a>
        <button class="nav__lang" data-lang-toggle aria-label="Switch language">EN / RU</button>
        <button class="nav__toggle" data-theme-toggle aria-label="Switch to dark mode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <main>

    <!-- [1] INTRO
         SOURCE: frameworks/{fw}/onboarding.yml -->
    <section class="hero" id="intro" aria-labelledby="intro-heading">
      <div class="container">
        <p class="hero__eyebrow" data-i18n="nav.framework_name"></p>
        <h1 class="hero__headline" id="intro-heading" data-i18n="intro.heading"></h1>
        <p class="hero__tagline" data-i18n="intro.time"></p>
      </div>
    </section>

    <!-- [2] STEPS 01-05
         RULE: numbered 01-05, no icons, no bullets
         RULE: each step has a short title and a body sentence
         SOURCE: frameworks/{fw}/onboarding.yml -->
    <section class="section" id="steps" aria-labelledby="steps-heading">
      <div class="container">
        <h2 class="section__heading" id="steps-heading" data-i18n="steps.heading"></h2>
        <ol class="steps" role="list">
          <li class="step">
            <span class="step__num" aria-hidden="true">01</span>
            <div>
              <strong class="step__title" data-i18n="steps.01_title"></strong>
              <p class="step__body" data-i18n="steps.01_body"></p>
            </div>
          </li>
          <li class="step">
            <span class="step__num" aria-hidden="true">02</span>
            <div>
              <strong class="step__title" data-i18n="steps.02_title"></strong>
              <p class="step__body" data-i18n="steps.02_body"></p>
            </div>
          </li>
          <li class="step">
            <span class="step__num" aria-hidden="true">03</span>
            <div>
              <strong class="step__title" data-i18n="steps.03_title"></strong>
              <p class="step__body" data-i18n="steps.03_body"></p>
            </div>
          </li>
          <li class="step">
            <span class="step__num" aria-hidden="true">04</span>
            <div>
              <strong class="step__title" data-i18n="steps.04_title"></strong>
              <p class="step__body" data-i18n="steps.04_body"></p>
            </div>
          </li>
          <li class="step">
            <span class="step__num" aria-hidden="true">05</span>
            <div>
              <strong class="step__title" data-i18n="steps.05_title"></strong>
              <p class="step__body" data-i18n="steps.05_body"></p>
            </div>
          </li>
        </ol>
      </div>
    </section>

    <!-- [3] FINAL CTA -->
    <section class="section" id="cta">
      <div class="container">
        <a href="./scenarios.html" class="btn btn--primary" data-i18n="cta.scenarios"></a>
        <a href="https://github.com/Malstrom/zeroth" target="_blank" rel="noopener noreferrer" class="btn btn--ghost" data-i18n="cta.github"></a>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__inner">
        <span class="footer__left" data-i18n="footer.copy"></span>
        <nav class="footer__links" aria-label="Footer links">
          <a href="./zeroth.html" data-i18n="footer.link_zeroth">zeroth</a>
          <a href="https://github.com/Malstrom/zeroth" target="_blank" rel="noopener noreferrer" data-i18n="footer.link_github">GitHub</a>
          <a href="./scenarios.html" data-i18n="footer.link_scenarios">Scenarios</a>
          <a href="./start.html" data-i18n="footer.link_start">Start</a>
        </nav>
        <div class="footer__toggles">
          <button class="nav__lang" data-lang-toggle aria-label="Switch language">EN / RU</button>
          <button class="nav__toggle" data-theme-toggle aria-label="Switch to dark mode">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js.yaml.min.js"></script>
  <script src="./assets/js/i18n.js"></script>
  <script>
    (function(){
      const r = document.documentElement;
      const toggles = document.querySelectorAll('[data-theme-toggle]');
      const sun = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
      const moon = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      let theme = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
      r.setAttribute('data-theme', theme);
      toggles.forEach(btn => {
        btn.innerHTML = theme === 'dark' ? sun : moon;
        btn.addEventListener('click', () => {
          theme = theme === 'dark' ? 'light' : 'dark';
          r.setAttribute('data-theme', theme);
          toggles.forEach(b => { b.innerHTML = theme === 'dark' ? sun : moon; });
        });
      });
    })();
  </script>

</body>
</html>
