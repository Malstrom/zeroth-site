  landing:
    hero:
      eyebrow: "dojo / language"
      title: "Learn a language the way your brain actually works."
      body: "Not courses. Not repetition for its own sake. An AI sensei that tracks exactly what you know, finds the gap, and works only there."

    problem:
      label: "The problem"
      title: "Most language learning is theatre."
      p1: "You finish a lesson. The app gives you a streak. You feel productive. Three weeks later you can't hold a five-minute conversation."
      p2: "The system is optimised for retention of its own product — not for your actual fluency. It teaches what's easy to teach, not what you actually need."
      p3: "dojo is built on a different premise: the AI tracks your real knowledge state, session after session, and only ever works on the gap between where you are and where you need to be."

    flow:
      label: "How it works"
      title: "Three moves, repeated until fluent."
      step1:
        title: "Map the gap"
        body: "At the start of every session the AI reads your log and identifies exactly what you don't know yet. No re-briefing. No warm-up theatre."
      step2:
        title: "Work the gap"
        body: "The sensei drills the gap — vocabulary, grammar, listening, production. It adjusts in real time based on your responses."
      step3:
        title: "Log the delta"
        body: "At the end of the session the AI writes an immutable log entry. Next session starts exactly where this one ended."

    principles:
      label: "Principles"
      title: "What dojo believes about language learning."
      p1: "Fluency is not the accumulation of correct answers. It is the reduction of the gap between passive understanding and active production."
      p2: "The AI never moves forward until the current gap is closed. Speed is a consequence of precision, not of skipping."
      p3: "Every session is logged immutably. The record is the source of truth — not your memory of what you covered."
      p4: "Grammar is introduced only when it explains something you have already encountered in real language. Rules follow use, not the other way around."
      p5: "The sensei does not praise effort. It tracks results. The log shows what changed — that is the only meaningful feedback."

    cta:
      scenarios: "See scenarios"

