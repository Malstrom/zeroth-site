ru:
  meta:
    title: "dojo — изучение языка"

  nav:
    zeroth: "zeroth ←"
    framework_name: "dojo"
    scenarios: "Сценарии"
    start: "Начать"

  landing:
    hero:
      eyebrow: "dojo / язык"
      title: "Учи язык так, как работает твой мозг."
      body: "Не курсы. Не повторение ради повторения. ИИ-сенсей, который отслеживает, что ты знаешь, находит пробел и работает только там."
    problem:
      label: "Проблема"
      title: "Большинство людей учат язык годами — и так и не начинают говорить свободно."
      p1: "Не потому что не старались. Потому что повторяли то, что уже знают, вместо того чтобы работать над тем, чего не хватает."
      p2: "dojo отслеживает твоё реальное состояние знаний от сессии к сессии и работает только над пробелом между тем, где ты сейчас, и тем, где тебе нужно быть."
      p3: "Нужна техническая лексика для работы, разговорная речь или академический стиль — он адаптируется под твою реальную цель. Никакой лишней работы. Только то, что реально движет вперёд."
    session:
      label: "На практике"
      title: "Сессия с dojo"
      intro: "Ты открываешь разговор. dojo уже знает, где ты остановился в прошлый раз."
      bar_label: "сценарий · study_open"
      user_msg1: "привет, продолжим изучать итальянский"
      ai_reading: "Читаю журнал последней сессии..."
      ai_reply1_pre: "Bentornato. У тебя 2 открытых пробела:"
      ai_gap1_tag: "грамматика"
      ai_gap1_body: "Passato prossimo vs imperfetto — систематические ошибки в длитемьных прошедших состояниях."
      ai_gap2_tag: "лексика / регистр"
      ai_gap2_body: "Формальный регистр в письменном итальянском — 6 целевых выражений введено, 2 ещё не активны."
      ai_rec: "Предлагаю начать с грамматики — она блокирует больше всего."
      user_msg2: "ok"
      ai_reply2_intro: "Хорошо. Начинаем."
      ai_reply2_example: "“Mentre studiavo, ho capito tutto.”"
      ai_reply2_hint: "Imperfetto задаёт фон или действие в процессе. Passato prossimo отмечает событие, которое происходит внутри этой сцены или меняет её."
      ai_reply2_question: "Что меняется, если сказать “ho studiato”?"
    cta:
      scenarios: "Смотреть все сценарии →"

  scenarios:
    hero:
      eyebrow: "dojo / сценарии"
      title: "Каждая сессия идёт по сценарию."
      body: "dojo не работает в свободном режиме. Каждое взаимодействие отображается на определённый сценарий — поэтому ИИ всегда знает, что делает и зачем."
    list:
      label: "Сценарии"
      title: "Что умеет dojo."
    study_open:
      title: "Изучить тему"
      desc: "Открыть сессию по любой теме. dojo читает твои пробелы, объясняет концепции и проводит дриллинг после каждой."
      trigger: "› study passato prossimo vs imperfetto"
    randori:
      title: "Дриллинг и практика"
      desc: "Проверь себя по тому, что только изучил. dojo задаёт вопросы на понимание и обновляет карту пробелов в реальном времени."
      trigger: "› проверь меня"
    declare_goal:
      title: "Поставить цель"
      desc: "Объяви чего хочешь достичь — уровень языка, требования вакансии, конкретный проект. dojo разобьёт нужные темы и отслеживает прогресс."
      trigger: "› хочу достичь B2 по итальянскому"
    evaluate_readiness:
      title: "Проверка готовности"
      desc: "После учёбы dojo оценивает, готов ли ты к экзамену или есть ещё пробелы, которые нужно закрыть."
      trigger: "› я готов к экзамену?"
    topic_shinsa:
      title: "Экзамен по теме"
      desc: "Формальный экзамен по одной теме. Никакой обратной связи во время теста — только финальный балл и отчёт о пробелах."
      trigger: "› shinsa по passato prossimo"
    goal_shinsa:
      title: "Финальный экзамен цели"
      desc: "Финальный экзамен по заявленной цели. Сдай на 80%+ и dojo выдаст makimono — постоянную запись о твоём достижении."
      trigger: "› я готов к экзамену B2"
    cta: "Начать →"

  start:
    hero:
      eyebrow: "dojo / начало"
      title: "Пять шагов."
      body: "Никакой установки. Никакой настройки. Два аккаунта и пять минут."
    required: "обязательно"
    copy: "Копировать"
    step1:
      title: "Perplexity Pro"
      desc: "dojo работает через Perplexity AI. Pro нужен для подключения GitHub — именно через него dojo читает и записывает твой прогресс автоматически."
    step2:
      title: "GitHub"
      desc: "Бесплатно. Твой экземпляр dojo живёт в репозитории GitHub — твои данные, твоя история, полностью под твоим контролем."
    step3:
      title: "Создай Space в Perplexity"
      desc: "Открой Spaces в Perplexity и создай новый. Назови его точно так:"
      callout_label: "Название Space"
    step4:
      title: "Вставь инструкции в Space"
      desc: "Открой настройки Space, найди поле «Инструкции» и вставь текст ниже. Замени &lt;your-username&gt; на свой GitHub ник."
      note: "Эти инструкции сообщают dojo, где находится твой репозиторий и как вести себя в каждой сессии."
    step5:
      title: "Начни первую сессию"
      desc: "Открой новый чат внутри Space dojo. Убедись, что коннектор GitHub активен (+ → Connectors → GitHub). Потом отправь:"
      note: "dojo прочитает репозиторий, запустит онбординг и дальше будет вести тебя сам."

  wip:
    title: "Скоро здесь."
    body: "Страница в разработке. Загляни позже."

  footer:
    meta: "экосистема zeroth"
    zeroth: "zeroth"
    framework: "dojo"
