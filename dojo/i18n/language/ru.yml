      ai_gap2_tag: "лексика / регистр"
      ai_gap2_body: "Формальный регистр в письменном итальянском — 6 целевых выражений введено, 2 ещё не активны."
      ai_gap3_tag: "аудирование"
      ai_gap3_body: "Понимание на скорости носителя — 9 дней без сессии, риск деградации недавнего прогресса."
      ai_rec: "Предлагаю начать с грамматики — она блокирует больше всего."
