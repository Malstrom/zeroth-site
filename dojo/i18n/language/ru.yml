    title: "dojo — изучение языка"

  nav:
    zeroth: "zeroth ←"
    framework_name: "dojo"
    why: "Зачем"
    scenarios: "Сценарии"
    start: "Начать"

  landing:
    hero:
      eyebrow: "dojo / язык"
      title: "Учи язык так, как работает твой мозг."
      body: "Не курсы. Не повторение ради повторения. ИИ-сенсей, который отслеживает, что ты знаешь, находит пробел и работает только там."

    problem:
      label: "Проблема"
      title: "Большинство методик изучения языка — это театр."
      p1: "Ты заканчиваешь урок. Приложение даёт тебе серию. Ты чувствуешь продуктивность. Через три недели ты не можешь поддержать пятиминутный разговор."
      p2: "Система оптимизирована под удержание в своём продукте — а не под твою реальную беглость речи. Она учит тому, что легко преподавать, а не тому, что тебе действительно нужно."
      p3: "dojo построен на другом принципе: ИИ отслеживает твоё реальное состояние знаний от сессии к сессии и работает только над пробелом между тем, где ты находишься, и тем, где тебе нужно быть."

    session:
      label: "Реальная сессия"
      title: "Вот как выглядит dojo."
      user_msg: "ciao, riprendiamo a studiare italiano"
      ai_meta1: "↳ читаю журнал последней сессии..."
      ai_meta2: "↳ найден пробел: passato prossimo vs imperfetto"
      ai_meta3: "↳ формирую фокус на сегодня"
      ai_reply: "Bentornato. В прошлый раз мы остановились на passato prossimo. У тебя всё ещё систематические ошибки в различии с imperfetto — ты используешь passato prossimo для длительных состояний в прошлом. Сегодня работаем именно там. Iniziamo."

    flow:
      label: "Как это работает"
      title: "Три шага, повторяемых до беглости."
      step1:
        title: "Найти пробел"
        body: "В начале каждой сессии ИИ читает твой журнал и определяет, что именно ты ещё не знаешь. Без повторного объяснения. Без вводного театра."
      step2:
        title: "Работать над пробелом"
        body: "Сенсей прорабатывает пробел — лексика, грамматика, аудирование, говорение. Он корректирует работу в реальном времени на основе твоих ответов."
      step3:
        title: "Записать дельту"
        body: "В конце сессии ИИ делает неизменяемую запись в журнале. Следующая сессия начинается ровно там, где закончилась эта."

    principles:
      label: "Принципы"
      title: "Во что dojo верит в отношении изучения языка."
      p1: "Беглость — это не накопление правильных ответов. Это сокращение разрыва между пассивным пониманием и активным производством речи."
      p2: "ИИ никогда не двигается вперёд, пока текущий пробел не закрыт. Скорость — следствие точности, а не пропусков."
      p3: "Каждая сессия фиксируется неизменяемо. Журнал — источник истины, а не твои воспоминания о пройденном."
      p4: "Грамматика вводится только тогда, когда она объясняет то, с чем ты уже столкнулся в реальном языке. Правила следуют за употреблением, а не наоборот."
      p5: "Сенсей не хвалит усилия. Он отслеживает результаты. Журнал показывает, что изменилось — это единственная значимая обратная связь."

    cta:
      scenarios: "Смотреть сценарии"

  footer:
    meta: "экосистема zeroth"
    zeroth: "zeroth"
    framework: "dojo"
