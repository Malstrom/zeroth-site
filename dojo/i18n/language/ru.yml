      p1: "Ты заканчиваешь урок. Приложение даёт тебе серию. Ты чувствуешь продуктивность. Через три недели ты не можешь поддержать пятиминутный разговор."
      p2: "Система оптимизирована под удержание в своём продукте — а не под твою реамьную беглость речи. Она учит тому, что легко преподавать, а не тому, что тебе действительно нужно."
      p3: "dojo построен на другом принципе: ИИ отслеживает твоё реальное состояние знаний от сессии к сессии и работает только над пробелом между тем, где ты находишься, и тем, где тебе нужно быть."

    session:
      label: "На практике"
      title: "Сессия с dojo"
