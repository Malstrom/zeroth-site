  landing:
    hero:
      eyebrow: "dojo / программирование"
      title: "Расти как инженер так, как растут лучшие."
      body: "Не туториалы. Не случайный LeetCode. AI-сенсей, который точно знает, что ты умеешь, находит пробел и работает только с ним."
    problem:
      label: "Проблема"
      title: "Большинство разработчиков упираются в потолок задолго до своего потенциала."
      p1: "Не потому что перестали писать код. Потому что продолжают писать то, что уже умеют — решают удобные задачи вместо тех, которые обнажают настоящие пробелы."
      p2: "dojo отслеживает твой реальный уровень знаний от сессии к сессии: концепции, которые ты освоил, паттерны, которые видел но не применяешь под давлением, и слепые пятна, о которых не знаешь."
      p3: "Пройти system design интервью, писать production-quality код или глубоко освоить язык или фреймворк — dojo адаптируется к твоей цели. Никакого лишнего повторения. Только работа, которая двигает вперёд."
    own:
      label: "Твой dojo"
      title: "Это не платформа. Это твоё."
      p1: "dojo не живёт на сервере. Сессии, карта пробелов, прогресс — всё хранится в личном репозитории GitHub. Блокнот, который принадлежит только тебе. Скачай, перемести, поделись или используй с любым AI-инструментом."
      p2: "Никакой подписки, которая истекает. Никакой истории, которая исчезает. Если сервис закроется завтра — данные всё равно у тебя на машине."
      p3: "И dojo не ограничен одним языком или стеком. Rust, Python, system design, алгоритмы, распределённые системы — если ты можешь описать, чему хочешь научиться, dojo отследит пробелы и выстроит сессии вокруг этого."
    session:
      bar_label: "сценарий · study_open"
      user_msg1: "продолжим работу над владением в Rust"
      ai_reading: "Читаю лог последней сессии..."
      ai_reply1_pre: "С возвращением. У тебя 2 открытых пробела:"
      ai_gap1_tag: "владение"
      ai_gap1_body: "Аннотации времён жизни в структурах — введены на прошлой сессии, под давлением применяются с ошибками."
      ai_gap2_tag: "borrow checker"
      ai_gap2_body: "Одновременные мутабельные и иммутабельные ссылки — в нетривиальных случаях всё ещё вызывают ошибки компиляции."
      ai_rec: "Предлагаю начать с времён жизни — это корень большинства borrow-ошибок."
      user_msg2: "ок"
      ai_reply2_intro: "Хорошо. Поехали."
      ai_reply2_example: "`struct Important<'a> { part: &'a str }`"
      ai_reply2_hint: "Лайфтайм `'a` говорит компилятору: эта структура не может пережить ссылку, которую держит. Это контракт между структурой и её данными."
      ai_reply2_question: "Что произойдёт, если попытаться вернуть эту структуру из функции без аннотации возвращаемого типа с `'a`?"
    cta:
      scenarios: "Все сценарии"

