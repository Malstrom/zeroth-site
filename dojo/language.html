<!DOCTYPE html>
<html lang="en" data-theme="light" data-page="language">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="meta.title">zeroth template</title>
  <meta name="description" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-surface-offset: #f0ede8;
      --color-divider: #dcd9d5;
      --color-border: #d4d1ca;
      --color-text: #28251d;
      --color-text-muted: #6b6860;
      --color-text-faint: #b0aea9;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --shadow-sm: 0 1px 3px oklch(0.2 0.01 80 / 0.06);
      --shadow-md: 0 4px 16px oklch(0.2 0.01 80 / 0.09);
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'Geist', 'Helvetica Neue', sans-serif;
      --font-mono: 'Geist Mono', 'Courier New', monospace;
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
      --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem;
      --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
      --space-16: 4rem; --space-20: 5rem; --space-24: 6rem;
      --content-narrow: 640px;
      --content-default: 920px;
      --content-wide: 1160px;
      --t: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-surface-offset: #252422;
      --color-divider: #2e2d2b;
      --color-border: #393836;
      --color-text: #cdccca;
      --color-text-muted: #8a8885;
      --color-text-faint: #5a5957;
      --color-primary: #4f98a3;
      --color-primary-hover: #6db8c4;
      --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.25);
      --shadow-md: 0 4px 16px oklch(0 0 0 / 0.35);
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
    body { min-height:100dvh; font-family:var(--font-body); font-size:var(--text-base); line-height:1.65; color:var(--color-text); background:var(--color-bg); }
    a { color:inherit; text-decoration:none; transition:color var(--t), background var(--t); }
    button { cursor:pointer; background:none; border:none; font:inherit; color:inherit; }
    h1,h2,h3 { line-height:1.15; text-wrap:balance; }
    p, li { max-width:68ch; text-wrap:pretty; }
    :focus-visible { outline:2px solid var(--color-primary); outline-offset:3px; border-radius:var(--radius-sm); }
    .container { max-width:var(--content-default); margin-inline:auto; padding-inline:clamp(var(--space-4),5vw,var(--space-12)); }
    .nav { position:sticky; top:0; z-index:100; background:color-mix(in oklch,var(--color-bg) 92%,transparent); backdrop-filter:blur(12px); border-bottom:1px solid var(--color-divider); }
    .nav__inner { max-width:var(--content-wide); margin-inline:auto; padding:var(--space-4) clamp(var(--space-4),5vw,var(--space-12)); display:flex; align-items:center; justify-content:space-between; gap:var(--space-4); flex-wrap:wrap; }
    .nav__brand { display:flex; align-items:center; gap:var(--space-3); flex-wrap:wrap; }
    .nav__logo { display:flex; align-items:center; gap:var(--space-2); font-family:var(--font-mono); font-size:var(--text-sm); font-weight:500; letter-spacing:0.02em; }
    .nav__framework { font-family:var(--font-mono); font-size:var(--text-sm); color:var(--color-text-muted); letter-spacing:0.08em; text-transform:uppercase; }
    .nav__links, .nav__actions { display:flex; align-items:center; gap:var(--space-4); flex-wrap:wrap; }
    .nav__link { font-size:var(--text-sm); color:var(--color-text-muted); }
    .nav__link:hover, .nav__logo:hover { color:var(--color-primary); }
    .nav__lang { padding:0.45rem 0.7rem; border:1px solid var(--color-border); border-radius:var(--radius-md); font-size:var(--text-sm); color:var(--color-text-muted); }
    .nav__toggle { width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:var(--radius-md); color:var(--color-text-muted); }
    .nav__toggle:hover, .nav__lang:hover { color:var(--color-text); background:var(--color-surface-offset); }
    .page-hero { padding-block:clamp(var(--space-16),10vw,var(--space-24)) var(--space-12); border-bottom:1px solid var(--color-divider); }
    .page-hero__eyebrow { font-family:var(--font-mono); font-size:var(--text-xs); letter-spacing:0.12em; text-transform:uppercase; color:var(--color-text-faint); margin-bottom:var(--space-6); }
    .page-hero__title { font-size:var(--text-2xl); font-weight:300; letter-spacing:-0.02em; margin-bottom:var(--space-5); }
    .page-hero__body { font-size:var(--text-lg); font-weight:300; color:var(--color-text-muted); max-width:54ch; }
    .section { padding-block:clamp(var(--space-12),8vw,var(--space-20)); border-bottom:1px solid var(--color-divider); }
    .section:last-of-type { border-bottom:none; }
    .section__label { font-family:var(--font-mono); font-size:var(--text-xs); letter-spacing:0.12em; text-transform:uppercase; color:var(--color-text-faint); margin-bottom:var(--space-5); }
    .section__heading { font-size:var(--text-xl); font-weight:300; letter-spacing:-0.01em; margin-bottom:var(--space-4); }
    .section__body { color:var(--color-text-muted); line-height:1.7; }
    .stack { display:grid; gap:var(--space-4); }
    .numbered-list { list-style:none; display:grid; gap:var(--space-5); margin-top:var(--space-8); }
    .numbered-list li { display:grid; grid-template-columns:auto 1fr; gap:var(--space-4); padding-top:var(--space-4); border-top:1px solid var(--color-divider); }
    .numbered-list__num { font-family:var(--font-mono); font-size:var(--text-xs); color:var(--color-text-faint); letter-spacing:0.08em; }
    .numbered-list strong { display:block; font-size:var(--text-sm); font-weight:500; color:var(--color-text); margin-bottom:var(--space-2); }
    .principles { display:grid; gap:var(--space-4); margin-top:var(--space-8); }
    .principle { padding:var(--space-5) 0; border-top:1px solid var(--color-divider); }
    .principle__num { display:block; font-family:var(--font-mono); font-size:var(--text-xs); color:var(--color-text-faint); margin-bottom:var(--space-2); }
    .cta-row { display:flex; gap:var(--space-4); flex-wrap:wrap; margin-top:var(--space-8); }
    .btn { display:inline-flex; align-items:center; gap:var(--space-2); padding:var(--space-3) var(--space-6); border-radius:var(--radius-md); font-size:var(--text-sm); border:1px solid var(--color-border); }
    .btn:hover { color:var(--color-primary); border-color:color-mix(in oklch,var(--color-primary) 35%,var(--color-border)); background:var(--color-surface-offset); }
    .footer { padding-block:var(--space-12); }
    .footer__inner { display:flex; align-items:center; justify-content:space-between; gap:var(--space-4); flex-wrap:wrap; color:var(--color-text-faint); }
    .footer__meta { font-family:var(--font-mono); font-size:var(--text-xs); letter-spacing:0.06em; }
    .footer__links { display:flex; gap:var(--space-6); flex-wrap:wrap; }
    .footer__links a { font-size:var(--text-xs); color:var(--color-text-faint); }
    .footer__links a:hover { color:var(--color-text-muted); }
    @media (max-width: 700px) {
      .nav__inner { align-items:flex-start; }
      .numbered-list li { grid-template-columns:1fr; gap:var(--space-2); }
    }
  </style>
</head>
<body>
  <nav class="nav" aria-label="Primary navigation">
    <div class="nav__inner">
      <div class="nav__brand">
        <a href="../zeroth.html" class="nav__logo" aria-label="Back to zeroth">
          <span data-i18n="nav.zeroth">zeroth ←</span>
        </a>
        <span class="nav__framework" data-i18n="nav.framework_name">framework</span>
      </div>
      <div class="nav__links">
        <a href="why.html" class="nav__link" data-i18n="nav.why">Why</a>
        <a href="scenarios.html" class="nav__link" data-i18n="nav.scenarios">Scenarios</a>
        <a href="start.html" class="nav__link" data-i18n="nav.start">Start</a>
      </div>
      <div class="nav__actions">
        <button class="nav__lang" data-lang-toggle aria-label="Switch language">EN / RU</button>
        <button class="nav__toggle" data-theme-toggle aria-label="Switch theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
      </div>
    </div>
  </nav>

  <main>
    <section class="page-hero" aria-labelledby="landing-title">
      <div class="container">
        <!-- Source: dojo/i18n/language/en.yml landing.hero.* No CTA in landing hero. -->
        <p class="page-hero__eyebrow" data-i18n="landing.hero.eyebrow"></p>
        <h1 class="page-hero__title" id="landing-title" data-i18n="landing.hero.title"></h1>
        <p class="page-hero__body" data-i18n="landing.hero.body"></p>
      </div>
    </section>

    <section class="section" aria-labelledby="landing-problem-title">
      <div class="container">
        <!-- Source: dojo/i18n/language/en.yml landing.problem.* Narrative section: paragraphs only, no bullets. -->
        <p class="section__label" data-i18n="landing.problem.label"></p>
        <h2 class="section__heading" id="landing-problem-title" data-i18n="landing.problem.title"></h2>
        <div class="stack section__body">
          <p data-i18n="landing.problem.p1"></p>
          <p data-i18n="landing.problem.p2"></p>
          <p data-i18n="landing.problem.p3"></p>
        </div>
      </div>
    </section>

    <section class="section" aria-labelledby="landing-flow-title">
      <div class="container">
        <!-- Source: dojo/i18n/language/en.yml landing.flow.* Steps must stay numeric 01/02/03, no icons. -->
        <p class="section__label" data-i18n="landing.flow.label"></p>
        <h2 class="section__heading" id="landing-flow-title" data-i18n="landing.flow.title"></h2>
        <ol class="numbered-list">
          <li>
            <span class="numbered-list__num">01</span>
            <div>
              <strong data-i18n="landing.flow.step1.title"></strong>
              <p class="section__body" data-i18n="landing.flow.step1.body"></p>
            </div>
          </li>
          <li>
            <span class="numbered-list__num">02</span>
            <div>
              <strong data-i18n="landing.flow.step2.title"></strong>
              <p class="section__body" data-i18n="landing.flow.step2.body"></p>
            </div>
          </li>
          <li>
            <span class="numbered-list__num">03</span>
            <div>
              <strong data-i18n="landing.flow.step3.title"></strong>
              <p class="section__body" data-i18n="landing.flow.step3.body"></p>
            </div>
          </li>
        </ol>
      </div>
    </section>

    <section class="section" aria-labelledby="landing-principles-title">
      <div class="container">
        <!-- Source: dojo/i18n/language/en.yml landing.principles.* Five numbered principles, no decorative icons. -->
        <p class="section__label" data-i18n="landing.principles.label"></p>
        <h2 class="section__heading" id="landing-principles-title" data-i18n="landing.principles.title"></h2>
        <div class="principles">
          <article class="principle">
            <span class="principle__num">01</span>
            <p class="section__body" data-i18n="landing.principles.p1"></p>
          </article>
          <article class="principle">
            <span class="principle__num">02</span>
            <p class="section__body" data-i18n="landing.principles.p2"></p>
          </article>
          <article class="principle">
            <span class="principle__num">03</span>
            <p class="section__body" data-i18n="landing.principles.p3"></p>
          </article>
          <article class="principle">
            <span class="principle__num">04</span>
            <p class="section__body" data-i18n="landing.principles.p4"></p>
          </article>
          <article class="principle">
            <span class="principle__num">05</span>
            <p class="section__body" data-i18n="landing.principles.p5"></p>
          </article>
        </div>
        <div class="cta-row">
          <a href="scenarios.html" rel="nofollow noreferrer" class="btn" data-i18n="landing.cta.scenarios"></a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__inner">
        <span class="footer__meta" data-i18n="footer.meta"></span>
        <nav class="footer__links" aria-label="Footer links">
          <a href="../zeroth.html" data-i18n="footer.zeroth"></a>
          <a href="#" data-i18n="footer.framework"></a>
        </nav>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script>
    (function(){
      const root = document.documentElement;
      const toggle = document.querySelector('[data-theme-toggle]');
      const sun = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
      const moon = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      let theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      root.setAttribute('data-theme', theme);
      if (toggle) {
        toggle.innerHTML = theme === 'dark' ? sun : moon;
        toggle.addEventListener('click', function(){
          theme = theme === 'dark' ? 'light' : 'dark';
          root.setAttribute('data-theme', theme);
          toggle.innerHTML = theme === 'dark' ? sun : moon;
          toggle.setAttribute('aria-label', 'Switch to ' + (theme === 'dark' ? 'light' : 'dark') + ' mode');
        });
      }
    })();
  </script>
</body>
</html>
