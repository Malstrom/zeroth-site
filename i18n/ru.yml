ru:
  hero:
    eyebrow: "Нулевой закон"
    quote: "«Робот не может причинить вред человечеству или своим бездействием допустить, чтобы человечеству был причинён вред.»"
    attribution: "— Айзек Азимов, <em>Роботы и Империя</em>, 1985"
    tagline: "Нулевой закон не заменяет остальные. Он управляет ими.<br>Базовый свод правил для каждого AI-native фреймворка в экосистеме Malstrom."
    cta:
      explore: "Изучить фреймворки"
      github: "Открыть на GitHub"
  frameworks:
    label: "Фреймворки"
    heading: "Построены на нулевом законе"
    body: "Каждый фреймворк в экосистеме наследует правила zeroth: неизменяемые логи, сценарно-управляемый ИИ и единый источник истины. Каждый решает свою задачу в интеллектуальной работе."
  dojo:
    question: "Каков разрыв между тем, что я знаю,<br>и тем, что мне нужно знать?"
    desc: "Обучение с поддержкой ИИ. ИИ действует как сэнсэй: отслеживает состояние ваших знаний, работает только с пробелом и не позволяет перескакивать через основы."
  aurora:
    question: "Что я уже сделал, для кого,<br>и что мне нужно делать дальше?"
    desc: "Профессиональная память. ИИ помнит всё, что вы сделали для всех клиентов, поэтому каждая новая сессия начинается ровно там, где закончилась предыдущая."
  sudo:
    question: "Как найти и получить<br>работу, которую я действительно хочу?"
    desc: "Управление поиском работы. Неизменяемый лог воронки, полный контекст между сессиями, без повторных объяснений. ИИ знает весь ваш путь — от первой сессии до последней."
  common:
    readme: "Читать README"
  giskard:
    label: "Валидация"
    heading: "giskard обеспечивает соблюдение закона"
    body: "Каждый фреймворк, построенный на zeroth, можно валидировать через giskard. Если репозиторий нарушает определённые здесь правила, giskard это обнаружит. Нет zeroth — нет giskard. Сначала закон."
    cta: "Открыть giskard на GitHub"
  prereqs:
    label: "Перед началом"
    heading: "Что понадобится"
    body: "Все фреймворки этой экосистемы работают через Perplexity AI с подключением GitHub. Перед началом вам нужны две вещи."
    pro:
      name: "Perplexity Pro"
      desc: "Нужен для GitHub-коннектора. ИИ читает и изменяет репозиторий вашего экземпляра фреймворка прямо из чата."
    github:
      name: "Аккаунт GitHub"
      desc: "Бесплатно. Каждый экземпляр фреймворка живёт в собственном репозитории GitHub — ваши данные, ваша история, полный контроль."
